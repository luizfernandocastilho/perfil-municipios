services:
  db:
    image: postgis/postgis:16-3.4
    container_name: municipios-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-municipios_app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme_local}
      POSTGRES_DB: ${POSTGRES_DB:-perfil_municipios}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/schema:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-municipios_app}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: municipios-redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: municipios-api
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-municipios_app}:${POSTGRES_PASSWORD:-changeme_local}@db:5432/${POSTGRES_DB:-perfil_municipios}
      - REDIS_URL=redis://redis:6379/0
    ports:
      - "${API_PORT:-8000}:8000"
    volumes:
      - ./src:/app/src
      - ./data:/app/data
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    command: uvicorn src.api.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  pgdata:
  redisdata:
